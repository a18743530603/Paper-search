<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Paper Hunter{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Paper Hunter</a>
      <nav>
        <a href="/">搜索</a>
        <a href="/papers">历史</a>
        <a href="/evaluation">分块评测</a>
        <a href="/origin">Origin 绘图</a>
        <a href="/export.csv">CSV</a>
        <a href="/export.json">JSON</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/status_poll.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
